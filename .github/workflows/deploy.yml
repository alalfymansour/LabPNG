name: Deploy

on:
  push:
    branches: [main]

env:
  LABPULSE_API: http://192.168.1.167/api/deployments

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to /srv/labpng
        run: bash deploy.sh

      - name: Wait for service
        run: sleep 5 && curl -sf http://127.0.0.1:8000/metrics > /dev/null || (journalctl -u labpng -n 20 --no-pager && false)

      - name: Record success in LabPulse
        if: success()
        env:
          API_KEY: ${{ secrets.API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python -c "
          import os, json, urllib.request
          data = {
              'service_name': 'labpng',
              'status': 'success',
              'version': '1.0.0',
              'commit_sha': os.environ['COMMIT_SHA'][:7],
              'message': os.environ.get('COMMIT_MSG', 'Deployment succeeded')
          }
          req = urllib.request.Request(
              '${{ env.LABPULSE_API }}',
              data=json.dumps(data).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'X-API-Key': os.environ['API_KEY']
              }
          )
          urllib.request.urlopen(req)
          "

      - name: Record failure in LabPulse
        if: failure()
        env:
          API_KEY: ${{ secrets.API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python -c "
          import os, json, urllib.request
          data = {
              'service_name': 'labpng',
              'status': 'failed',
              'version': '1.0.0',
              'commit_sha': os.environ['COMMIT_SHA'][:7],
              'message': 'Deployment failed'
          }
          req = urllib.request.Request(
              '${{ env.LABPULSE_API }}',
              data=json.dumps(data).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'X-API-Key': os.environ['API_KEY']
              }
          )
          urllib.request.urlopen(req)
          " || true
