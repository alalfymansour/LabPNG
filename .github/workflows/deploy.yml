name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/alalfymansour/labpng
  LABPULSE_API: http://192.168.1.167/api/deployments
  KUBECONFIG: /home/alalfy/.kube/config

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u alalfymansour --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/labpng -n labpng --timeout=5m

      - name: Record success in LabPulse
        if: success()
        env:
          API_KEY: ${{ secrets.API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python -c "
          import os, json, urllib.request
          data = {
              'service_name': 'labpng',
              'status': 'success',
              'version': '1.0.0',
              'commit_sha': os.environ['COMMIT_SHA'][:7],
              'message': os.environ.get('COMMIT_MSG', 'Deployment succeeded')
          }
          req = urllib.request.Request(
              '${{ env.LABPULSE_API }}',
              data=json.dumps(data).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'X-API-Key': os.environ['API_KEY']
              }
          )
          urllib.request.urlopen(req)
          "

      - name: Record failure in LabPulse
        if: failure()
        env:
          API_KEY: ${{ secrets.API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python -c "
          import os, json, urllib.request
          data = {
              'service_name': 'labpng',
              'status': 'failed',
              'version': '1.0.0',
              'commit_sha': os.environ['COMMIT_SHA'][:7],
              'message': 'Deployment failed'
          }
          req = urllib.request.Request(
              '${{ env.LABPULSE_API }}',
              data=json.dumps(data).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'X-API-Key': os.environ['API_KEY']
              }
          )
          urllib.request.urlopen(req)
          " || true
